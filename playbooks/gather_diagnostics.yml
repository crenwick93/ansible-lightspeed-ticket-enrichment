---
- name: Gather system diagnostics from affected host
  hosts: all
  become: true
  gather_facts: true

  vars:
    service_name: "httpd.service"

  tasks:

    # ── Identify the affected service ──────────────────────────────

    - name: Extract service name from incident description (if present)
      ansible.builtin.set_fact:
        service_name: "{{ incident_description | default('') | regex_search('(\\S+\\.service)', '\\1') | default([service_name], true) | first }}"

    # ── Systemd diagnostics ────────────────────────────────────────

    - name: List all failed systemd units
      ansible.builtin.command: systemctl list-units --state=failed --no-pager --no-legend
      register: failed_units
      changed_when: false
      failed_when: false

    - name: Get status of the target service
      ansible.builtin.command: "systemctl status {{ service_name }} --no-pager"
      register: service_status
      changed_when: false
      failed_when: false

    - name: Check if service is enabled
      ansible.builtin.command: "systemctl is-enabled {{ service_name }}"
      register: service_enabled
      changed_when: false
      failed_when: false

    - name: Pull last 50 lines of journal for the target service
      ansible.builtin.command: "journalctl -u {{ service_name }} -n 50 --no-pager"
      register: service_journal
      changed_when: false
      failed_when: false

    # ── System health ──────────────────────────────────────────────

    - name: Get system uptime
      ansible.builtin.command: uptime
      register: sys_uptime
      changed_when: false

    - name: Get disk usage
      ansible.builtin.command: df -h /
      register: sys_disk
      changed_when: false

    - name: Get memory usage
      ansible.builtin.command: free -h
      register: sys_memory
      changed_when: false

    # ── Assemble diagnostics report ────────────────────────────────

    - name: Build diagnostics report
      ansible.builtin.set_fact:
        diagnostics_report: |
          === DIAGNOSTICS REPORT ===
          Host: {{ inventory_hostname }} ({{ ansible_default_ipv4.address | default('unknown') }})
          Timestamp: {{ ansible_date_time.iso8601 }}

          --- Target Service: {{ service_name }} ---
          Enabled: {{ service_enabled.stdout | default('unknown') }}
          Status:
          {{ service_status.stdout | default('unable to retrieve status') }}

          --- Journal Logs (last 50 lines) ---
          {{ service_journal.stdout | default('no journal entries found') }}

          --- All Failed Units ---
          {{ failed_units.stdout | default('none') | default('no failed units', true) }}

          --- System Health ---
          Uptime: {{ sys_uptime.stdout }}
          Disk:
          {{ sys_disk.stdout }}
          Memory:
          {{ sys_memory.stdout }}

    - name: Display diagnostics report
      ansible.builtin.debug:
        var: diagnostics_report

    # ── Publish for the next workflow node ──────────────────────────

    - name: Publish diagnostics report via set_stats
      ansible.builtin.set_stats:
        data:
          diagnostics_report: "{{ diagnostics_report }}"
          incident_sys_id: "{{ incident_sys_id }}"
          incident_description: "{{ incident_description }}"
