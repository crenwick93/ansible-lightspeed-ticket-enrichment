---
- name: ALIA Enrichment - Send diagnostics to AI agent
  hosts: localhost
  gather_facts: false

  vars:
    alia_base_url: "https://localhost"
    alia_token: "{{ lookup('env', 'ALIA_TOKEN') }}"
    validate_tls: false
    request_timeout: 120

  tasks:
    - name: Build ALIA query from incident and diagnostics
      ansible.builtin.set_fact:
        alia_query: |-
          Incident: {{ incident_description }}

          {{ diagnostics_report | default('No diagnostics report available.') }}

    - name: Call ALIA to analyse diagnostics
      ansible.builtin.uri:
        url: "{{ alia_base_url }}/api/lightspeed/v1/ai/chat/"
        method: POST
        headers:
          Authorization: "Bearer {{ alia_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          query: "{{ alia_query }}"
        return_content: true
        status_code: 200
        validate_certs: "{{ validate_tls }}"
        timeout: "{{ request_timeout }}"
      register: alia_response

    - name: Parse JSON response
      ansible.builtin.set_fact:
        alia_result: "{{ alia_response.json | default((alia_response.content | from_json), true) }}"

    - name: Show ALIA analysis
      ansible.builtin.debug:
        var: alia_result

    - name: Show worknotes (ServiceNow-ready)
      ansible.builtin.debug:
        msg: "{{ alia_result.worknotes | default('no worknotes returned') }}"

###############################################################################################
#####################  UPLOAD REPORT TO SERVICE NOW  ##########################################
- name: Upload ALIA analysis to ServiceNow
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Update incident with ALIA worknotes
      servicenow.itsm.incident:
        sys_id: "{{ incident_sys_id }}"
        state: 2
        other:
          work_notes: "{{ alia_result.worknotes | default('no worknotes returned') }}"
